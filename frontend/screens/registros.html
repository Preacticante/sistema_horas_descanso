<div class="card">
    <h1>Registrar Actividad</h1>
    <form id="registroForm">
        <div style="margin-bottom: 15px;">
            <label>Descripción de actividad:</label>
            <input type="text" id="desc" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Cantidad de horas:</label>
            <input type="number" id="horas" step="0.5" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
        </div>
        <button type="submit" class="btn" style="background:var(--gold);">Enviar a Base de Datos</button>
    </form>
</div>
