<div class="card">
    <h1>Registrar horas de descanso</h1>
    <form id="registroForm">
        <div style="margin-bottom: 18px;">
            <label>Empleado</label>
            <select id="reg-empleado" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; background:#f8faf8; color:#1f2d19;">
                <option value="">Selecciona un empleado...</option>
            </select>
        </div>
        <div id="horas-actuales" style="margin-bottom: 18px; font-size:0.95rem; color:#2f582f;">Horas extra disponibles: 0.00 hrs</div>
        <div style="margin-bottom: 18px;">
            <label>Horas por día</label>
            <input type="number" id="reg-horas" step="0.5" min="0.5" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
        </div>
        <div style="margin-bottom: 18px;">
            <label>Selecciona los días en el calendario</label>
            <div id="reg-calendar-container" style="margin-top: 12px; width:100%; max-width:560px; min-height:260px; padding:12px; border:1px solid #cbd5e1; border-radius:12px; background:#ffffff;"></div>
            <div id="reg-fechas-seleccionadas" style="margin-top:12px; font-size:0.95rem; color:#4b5563;">No hay fechas seleccionadas.</div>
        </div>
        <button type="submit" class="btn" style="background:var(--gold);">Guardar asignación</button>
    </form>
</div>
