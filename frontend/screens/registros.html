<div class="card">
    <h1 style="margin-top: 0; margin-bottom: 0.5rem; color: #1f2d19; font-size: 1.8rem; font-weight: 600;">Solicitudes de reposición</h1>
    <p style="margin-top: 0; margin-bottom: 2rem; color: #64748b;">Registra solicitudes y autoriza por niveles (jefe directo y jefe superior).</p>
    <form id="registroForm">
        <!-- Empleado -->
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.75rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">Empleado</label>
            <div id="reg-empleado-dropdown" style="position: relative;">
                <button type="button" id="reg-empleado-btn" style="width:100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; color: #1f2d19; font-size: 0.95rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                    <span id="reg-empleado-label">Selecciona un empleado...</span>
                    <svg style="width: 18px; height: 18px; fill: #2f582f;" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
                <div id="reg-empleado-menu" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #e0e0e0; border-top: none; border-radius: 0 0 10px 10px; max-height: 300px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.1);">
                </div>
                <input type="hidden" id="reg-empleado" name="reg-empleado" required>
            </div>
        </div>

        <!-- Horas disponibles -->
        <div id="horas-actuales" style="margin-bottom: 2rem; padding: 1rem; background: linear-gradient(135deg, rgba(47, 88, 47, 0.08) 0%, rgba(170, 127, 31, 0.08) 100%); border-left: 4px solid #2f582f; border-radius: 8px; font-size: 0.95rem; color: #2f582f; font-weight: 500;">Horas extra disponibles: <strong style="color: #AA7F31;">0.00 hrs</strong></div>

        <!-- Horas por día -->
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.75rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">Horas por día</label>
            <input type="number" id="reg-horas" step="0.5" min="0.5" required style="width:100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; color: #1f2d19; font-size: 0.95rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; box-sizing: border-box;" onfocus="this.style.borderColor='#AA7F31'; this.style.boxShadow='0 4px 12px rgba(170, 127, 31, 0.15)';" onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none';">
        </div>

        <!-- Motivo -->
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.75rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">Motivo</label>
            <textarea id="reg-motivo" required rows="3" maxlength="500" placeholder="Describe brevemente el motivo de la reposición" style="width:100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; color: #1f2d19; font-size: 0.95rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; box-sizing: border-box;"></textarea>
        </div>

        <!-- Autorizadores -->
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <div>
                <label style="display: block; margin-bottom: 0.75rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">ID jefe directo (opcional)</label>
                <input type="number" id="reg-jefe-directo" min="1" placeholder="Si se omite, se toma de la jerarquía" style="width:100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; color: #1f2d19; font-size: 0.95rem; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.75rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">ID jefe superior (opcional)</label>
                <input type="number" id="reg-jefe-superior" min="1" placeholder="Si se omite, se toma de la jerarquía" style="width:100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; color: #1f2d19; font-size: 0.95rem; box-sizing: border-box;">
            </div>
        </div>

        <!-- Calendario -->
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 1rem; color: #2f582f; font-weight: 600; font-size: 0.95rem;">Selecciona los días en el calendario</label>
            <div id="reg-calendar-container" style="margin: 0 auto; width:100%; max-width:560px; background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid #e8e8e8; box-shadow: 0 2px 8px rgba(0,0,0,0.04);"></div>
            <div id="reg-fechas-seleccionadas" style="margin-top: 1.5rem; padding: 0.75rem 1rem; background: #f0f4f0; border-left: 4px solid #AA7F31; border-radius: 6px; font-size: 0.95rem; color: #2f582f;">No hay fechas seleccionadas.</div>
        </div>

        <!-- Botón -->
        <button type="submit" class="btn" style="background: linear-gradient(135deg, #AA7F31 0%, #8b6a2a 100%); color: white; padding: 14px 28px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; width: 100%; max-width: 260px; box-shadow: 0 4px 12px rgba(170, 127, 31, 0.3);" onmouseover="this.style.boxShadow='0 6px 16px rgba(170, 127, 31, 0.4)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.boxShadow='0 4px 12px rgba(170, 127, 31, 0.3)'; this.style.transform='translateY(0)';">Crear solicitud(es)</button>
    </form>

    <hr style="margin: 2rem 0; border: none; border-top: 1px solid #e5e7eb;">

    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 1rem; flex-wrap: wrap;">
        <h2 style="margin:0; color:#1f2d19; font-size:1.2rem;">Bandeja de solicitudes</h2>
        <div style="display:flex; gap:8px; align-items:center;">
            <select id="registros-filtro-estado" style="width:auto; min-width: 150px;">
                <option value="">Todos los estados</option>
                <option value="pendiente">Pendientes</option>
                <option value="aprobada">Aprobadas</option>
                <option value="rechazada">Rechazadas</option>
            </select>
            <button type="button" id="btn-recargar-solicitudes" class="btn" style="background:#2f582f; color:#fff;">Recargar</button>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Empleado</th>
                    <th>Fecha</th>
                    <th>Horas</th>
                    <th>Estado JD</th>
                    <th>Estado JS</th>
                    <th>Final</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="registros-solicitudes-body">
                <tr>
                    <td colspan="8" style="text-align:center; padding: 14px;">Cargando solicitudes...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
