<div class="card empleados-card">
    <style>
        .empleados-card {
            padding: 32px;
            border-radius: 28px;
            background: white;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        }
        .empleados-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .empleados-header h1 {
            margin: 0;
            font-size: 2rem;
            color: #132e1c;
        }
        .empleados-bar {
            margin-top: 24px;
            display: grid;
            grid-template-columns: minmax(240px, 1fr) auto auto;
            gap: 12px;
            align-items: end;
        }
        .empleados-bar label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #243a29;
        }
        .empleados-bar input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #d7e0d6;
            background: #f8faf8;
            font-size: 0.95rem;
            color: #1f2d19;
        }
        .empleados-bar input:focus {
            outline: none;
            border-color: #2f7a42;
            box-shadow: 0 0 0 3px rgba(47, 122, 66, 0.12);
        }
        .empleados-btn {
            padding: 13px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .empleados-btn:hover {
            transform: translateY(-1px);
        }
        .empleados-btn-primary {
            background: var(--forest, #2e7d32);
            color: white;
        }
        .empleados-btn-secondary {
            background: #48515c;
            color: white;
        }
        .empleados-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 28px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(20, 40, 20, 0.06);
        }
        .empleados-table thead {
            background: linear-gradient(90deg, rgba(47,122,66,0.12), rgba(86,132,92,0.06));
        }
        .empleados-table th,
        .empleados-table td {
            padding: 18px 20px;
            text-align: left;
            color: #26382e;
        }
        .empleados-table th {
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .empleados-table tbody tr {
            background: white;
            border-bottom: 1px solid #f0f2f1;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .empleados-table tbody tr:hover {
            background: #f7f9f7;
            transform: translateY(-1px);
        }
        .empleados-table td:last-child {
            color: #6b7a6a;
        }
        .empleados-table .badge {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            background: #eff6ee;
            color: #2f702f;
            font-size: 0.85rem;
            font-weight: 700;
        }
        @media (max-width: 900px) {
            .empleados-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <div class="empleados-header">
        <h1>Empleados</h1>
    </div>

    <div class="empleados-bar">
        <div>
            <label for="filtro-ids">IDs de empleados</label>
            <input type="text" id="filtro-ids" placeholder="1, 2, 55, 57..." />
        </div>
        <button class="empleados-btn empleados-btn-primary" id="btn-buscar-empleados">Buscar</button>
        <button class="empleados-btn empleados-btn-secondary" id="btn-reset-empleados">Mostrar todos</button>
    </div>

    <table class="empleados-table">
        <thead>
            <tr>
                <th>No. Empleado</th>
                <th>Nombre</th>
                <th>Horas Saldo</th>
                <th>Salidas Tempranas</th>
            </tr>
        </thead>
        <tbody id="tabla-empleados">
            <tr>
                <td colspan="4" style="padding:18px; text-align:center; color:#5a6857;">Cargando empleados...</td>
            </tr>
        </tbody>
    </table>
</div>
