<div class="card empleados-card">
    <style>
        .empleados-card {
            padding: 32px;
            border-radius: 28px;
            background: white;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        }
        .empleados-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .empleados-header h1 {
            margin: 0;
            font-size: 2rem;
            color: #132e1c;
        }
        .empleados-bar {
            margin-top: 24px;
            display: grid;
            grid-template-columns: minmax(240px, 1fr) auto auto;
            gap: 12px;
            align-items: end;
        }
        .empleados-bar label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #243a29;
        }
        .empleados-bar input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #d7e0d6;
            background: #f8faf8;
            font-size: 0.95rem;
            color: #1f2d19;
        }
        .empleados-bar input:focus {
            outline: none;
            border-color: #2f7a42;
            box-shadow: 0 0 0 3px rgba(47, 122, 66, 0.12);
        }
        .empleados-btn {
            padding: 13px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .empleados-btn:hover {
            transform: translateY(-1px);
        }
        .empleados-btn-primary {
            background: var(--forest, #2e7d32);
            color: white;
        }
        .empleados-btn-secondary {
            background: #48515c;
            color: white;
        }
        .empleados-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 28px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(20, 40, 20, 0.06);
        }
        .empleados-table thead {
            background: linear-gradient(90deg, rgba(47,122,66,0.12), rgba(86,132,92,0.06));
        }
        .empleados-table th,
        .empleados-table td {
            padding: 18px 20px;
            text-align: left;
            color: #26382e;
        }
        .empleados-table th {
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .empleados-table tbody tr {
            background: white;
            border-bottom: 1px solid #f0f2f1;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .empleados-table tbody tr:hover {
            background: #f7f9f7;
            transform: translateY(-1px);
        }
        .empleados-table td:last-child {
            color: #6b7a6a;
        }
        .empleados-table .badge {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            background: #eff6ee;
            color: #2f702f;
            font-size: 0.85rem;
            font-weight: 700;
        }
        @media (max-width: 900px) {
            .empleados-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <div class="empleados-header">
        <h1>Empleados</h1>
        <button class="empleados-btn empleados-btn-primary" id="btn-abrir-modal">+ Registrar Horas</button>
    </div>

    <div class="empleados-bar">
        <div>
            <label for="filtro-ids">IDs de empleados</label>
            <input type="text" id="filtro-ids" placeholder="1, 2, 55, 57..." />
        </div>
        <button class="empleados-btn empleados-btn-primary" id="btn-filtrar-empleados">Filtrar</button>
        <button class="empleados-btn empleados-btn-secondary" id="btn-reset-empleados">Mostrar todos</button>
    </div>

    <table class="empleados-table">
        <thead>
            <tr>
                <th>No. Empleado</th>
                <th>Nombre</th>
                <th>Horas Saldo</th>
                <th>Retardos / Salidas Temp.</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-empleados">
            <tr>
                <td colspan="5" style="padding:18px; text-align:center; color:#5a6857;">Cargando empleados...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="modal-registro" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 30px; border-radius: 16px; width: 420px; max-width: 95%; box-shadow: 0 16px 45px rgba(10, 24, 15, 0.18);">
        <h2 style="margin-top: 0; margin-bottom: 16px; color: #1f3b23;">Registrar Horas Extra</h2>
        <form id="form-registrar-horas">
            <div style="margin-bottom: 18px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #2d4a33;">Empleado</label>
                <select id="reg-empleado" required style="width: 100%; padding: 12px; border: 1px solid #d2dbd3; border-radius: 10px; background: #fafcf9; color: #24382f;">
                    <option value="">Selecciona un empleado...</option>
                </select>
            </div>
            <div id="horas-actuales" style="margin-bottom: 16px; font-size: 0.95rem; color: #3a4b33;">Horas actuales: 0.00 hrs</div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #2d4a33;">Cantidad de Horas a asignar</label>
                <input type="number" step="0.1" id="reg-horas" required style="width: 100%; padding: 12px; border: 1px solid #d2dbd3; border-radius: 10px; background: #fafcf9; color: #24382f;">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" id="btn-cerrar-modal" style="padding: 10px 18px; background: #ced4d0; border: none; border-radius: 10px; cursor: pointer; color: #2e3f37;">Cancelar</button>
                <button type="submit" style="padding: 10px 18px; background: var(--forest, #2e7d32); color: white; border: none; border-radius: 10px; cursor: pointer;">Guardar Ajuste</button>
            </div>
        </form>
    </div>
</div>
