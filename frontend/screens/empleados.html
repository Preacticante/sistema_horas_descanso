<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Empleados</h1>
        <button class="btn" id="btn-abrir-modal" style="background:var(--forest, #2e7d32); padding:10px 20px; color:white; border:none; cursor:pointer; border-radius:4px;">
            + Registrar Horas
        </button>
    </div>
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; align-items: center;">
        <div style="flex: 1 1 300px;">
            <label for="filtro-ids" style="display: block; margin-bottom: 6px; font-weight: bold;">IDs de empleados (separados por comas):</label>
            <input type="text" id="filtro-ids" placeholder="1, 2, 55" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;" />
        </div>
        <button id="btn-filtrar-empleados" style="padding: 12px 22px; background: var(--forest, #2e7d32); color: white; border: none; cursor: pointer; border-radius: 6px; height: 44px;">Filtrar</button>
        <button id="btn-reset-empleados" style="padding: 12px 22px; background: #555; color: white; border: none; cursor: pointer; border-radius: 6px; height: 44px;">Mostrar todos</button>
    </div>
    
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="border-bottom: 2px solid #eee; text-align: left;">
                <th style="padding:15px;">No. Empleado</th>
                <th>Nombre</th>
                <th>Horas Saldo</th>
                <th>Retardos / Salidas Temp.</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-empleados">
            <tr>
                <td colspan="5" style="padding:15px; text-align:center;">Cargando empleados...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="modal-registro" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <h2 style="margin-top: 0;">Registrar Horas Extra</h2>
        <form id="form-registrar-horas">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Número de Empleado:</label>
                <input type="number" id="reg-empleado" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Cantidad de Horas:</label>
                <input type="number" step="0.1" id="reg-horas" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" id="btn-cerrar-modal" style="padding: 8px 15px; background: #ccc; border: none; border-radius: 4px; cursor: pointer;">Cancelar</button>
                <button type="submit" style="padding: 8px 15px; background: var(--forest, #2e7d32); color: white; border: none; border-radius: 4px; cursor: pointer;">Guardar Ajuste</button>
            </div>
        </form>
    </div>
</div>
