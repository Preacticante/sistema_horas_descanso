<div class="card">
    <h1>Configuración del Sistema</h1>
    <p class="subtitle">Define los parámetros operativos y políticas de horas extras.</p>

    <form id="config-form">
        <div class="config-grid">
            <section class="settings-section">
                <h2>Límites de Horas</h2>
                <div class="form-group">
                    <label>Máximo mensual (hrs)</label>
                    <input type="number" id="max-horas-mes" placeholder="Ej: 40">
                </div>
                <div class="form-group">
                    <label>Máximo diario (hrs)</label>
                    <input type="number" id="max-horas-diarias" placeholder="Ej: 2.0" step="0.5">
                </div>
            </section>

            <section class="settings-section">
                <h2>Reglas de Compensación</h2>
                <div class="form-group">
                    <label>Umbral mínimo para compensar</label>
                    <input type="number" id="min-horas-compensacion" placeholder="0.25" step="0.25">
                </div>
                <div class="form-group">
                    <label>Factor de descanso (x por cada hora)</label>
                    <input type="number" id="horas-descanso-por-hora" placeholder="1.0" step="0.25">
                </div>
            </section>
        </div>

        <section class="settings-section" style="margin-top: 1.4rem;">
            <div class="checkbox-group">
                <input id="permitir-recuperacion-otro-dia" type="checkbox">
                <label for="permitir-recuperacion-otro-dia">Permitir compensar en días distintos</label>
            </div>
            <div class="checkbox-group">
                <input id="alertas-exceso" type="checkbox">
                <label for="alertas-exceso">Activar alertas de exceso de horas</label>
            </div>
        </section>

        <div class="actions-row">
            <button class="btn primary" type="submit">Guardar cambios</button>
            <button class="btn secondary" type="button" id="btn-reset-config">Restaurar defaults</button>
        </div>
        
        <div class="actions-row" style="margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem;">
            <button class="btn tertiary" type="button" id="btn-export-config">Exportar JSON</button>
            <button class="btn tertiary" type="button" id="btn-import-config">Importar JSON</button>
        </div>
    </form>
</div>
