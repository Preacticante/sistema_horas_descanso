<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Acceso - UCO</title>
    <style>
        :root { --forest: #0f3a2e; --purple: #340C51; --gold: #AA7F31; --muted:#888; }
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--purple) 0%, var(--forest) 100%); }
        .login-card { background: rgba(255,255,255,0.98); padding: 2rem; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.45); text-align: left; border-top: 6px solid var(--gold); }
        .brand { display:flex; flex-direction:column; gap:6px; align-items:center; margin-bottom: 1rem; }
        .brand img { width: 120px; height:120px; object-fit:contain; border-radius:8px; }
        h1 { margin: 0 0 12px 0; font-size: 1.4rem; text-align:center; }
        label { display:block; font-size:0.85rem; color:#333; margin-bottom:6px; }
        .form-row { margin-bottom: 14px; }
        input[type="text"], input[type="email"], input[type="password"] { width:100%; padding:12px 14px; border-radius:8px; border:1px solid #e6e6e6; background:#fafafa; font-size:0.98rem; }
        .controls { display:flex; align-items:center; gap:8px; }
        .btn { width:100%; background:var(--gold); color:#fff; padding:12px; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
        .btn.secondary { background:#340C51; }
        .muted { color:var(--muted); font-size:0.85rem; }
        .row-between { display:flex; justify-content:space-between; align-items:center; gap:8px; }
        .error { color:#c62828; font-size:0.9rem; margin-top:6px; min-height:1.2em; }
        .success { color:#006400; font-size:0.9rem; min-height:1.2em; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter: blur(5px); align-items:center; justify-content:center; }
        .modal-content { background:#fff; padding:1.6rem; border-radius:10px; width:100%; max-width:360px; }
        .pw-row { display:flex; gap:8px; align-items:center; }
        .pw-toggle { background:transparent; border:none; cursor:pointer; color:var(--muted); }
        .strength { height:8px; border-radius:6px; background:#eee; overflow:hidden; }
        .strength > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#f44336,#ff9800,#4caf50); transition:width .25s ease; }
        .small { font-size:0.85rem; }
        .spinner { display:inline-block; width:18px; height:18px; border-radius:50%; border:2px solid rgba(255,255,255,0.4); border-top-color:rgba(255,255,255,0.9); animation:spin .8s linear infinite; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* Estilo para alerta bonita */
        .toast { position: fixed; bottom: 30px; right: 30px; background: #0f3a2e; color: white; padding: 1rem 2rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <main class="login-card" aria-labelledby="loginTitle">
        <div class="brand">
            <img src="logo_uco.png" alt="Logo UCO">
            <div style="flex:1">
                <h1 id="loginTitle">Acceso al Sistema</h1>
                <div class="muted">Ingresa con tu usuario o correo institucional</div>
            </div>
        </div>

        <form id="login-form" novalidate>
            <div class="form-row">
                <label for="login-username">Usuario o correo</label>
                <input id="login-username" name="username" type="text" autocomplete="username" placeholder="usuario o correo@dominio" required aria-required="true">
            </div>
            <div class="form-row">
                <label for="login-password">Contraseña</label>
                <div class="pw-row">
                    <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Contraseña" required aria-required="true">
                    <button type="button" id="toggle-pw" class="pw-toggle" aria-label="Mostrar contraseña">👁</button>
                </div>
            </div>
            <div class="form-row row-between">
                <label class="small"><input id="rememberMe" type="checkbox"> Recordarme</label>
                <a class="muted" href="#" onclick="openModal(); return false;">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="form-row">
                <button id="loginBtn" class="btn" type="submit">ENTRAR</button>
            </div>
            <div id="login-error" class="error" role="alert" aria-live="assertive"></div>
        </form>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <button id="openRegisterBtn" class="btn secondary">Crear cuenta</button>
        </div>
    </main>

    <div id="forgotModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
        <div class="modal-content">
            <h2 id="forgotTitle">Recuperar Acceso</h2>
            <p class="small muted">Ingresa tu correo institucional y te enviaremos instrucciones.</p>
            <input id="forgot-email" type="email" placeholder="ejemplo@dominio.com">
            <div style="display:flex; gap:8px; margin-top:12px;"><button class="btn" onclick="sendRecovery()">Enviar</button><button class="btn" onclick="closeModal()">Cancelar</button></div>
        </div>
    </div>

    <div id="registerModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="registerTitle">
        <div class="modal-content">
            <h2 id="registerTitle">Crear cuenta</h2>
            <form id="register-form">
                <div class="form-row"><label for="register-name">Nombre completo</label><input id="register-name" type="text" required></div>
                <div class="form-row"><label for="register-username">Usuario</label><input id="register-username" type="text" required></div>
                <div class="form-row"><label for="register-email">Correo electrónico</label><input id="register-email" type="email" required></div>
                <div class="form-row"><label for="register-password">Contraseña</label><input id="register-password" type="password" required></div>
                <div class="form-row"><label for="register-confirm-password">Confirmar contraseña</label><input id="register-confirm-password" type="password" required></div>
                <div class="form-row"><button id="registerBtn" type="submit" class="btn">Registrar</button></div>
            </form>
            <div style="margin-top:8px; text-align:center;"><button class="btn" onclick="closeRegisterModal()">Cerrar</button></div>
        </div>
    </div>

    <script>
        const API_URL = `${window.location.protocol}//${window.location.hostname}:8000`;
        const AUTH_TOKEN_KEY = 'auth_token';
        const AUTH_USER_KEY = 'auth_user';
        if (sessionStorage.getItem(AUTH_TOKEN_KEY) || localStorage.getItem(AUTH_TOKEN_KEY)) {
            window.location.href = 'index.html';
        }
        const forgotModal = document.getElementById('forgotModal');
        const registerModal = document.getElementById('registerModal');
        function openModal(){ forgotModal.style.display='flex'; }
        function closeModal(){ forgotModal.style.display='none'; }
        function openRegisterModal(){ registerModal.style.display='flex'; }
        function closeRegisterModal(){ registerModal.style.display='none'; }
        
        function mostrarAlerta(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        document.getElementById('toggle-pw').addEventListener('click', ()=>{
            const t = document.getElementById('login-password').type === 'password' ? 'text' : 'password';
            document.getElementById('login-password').type = t;
        });

        function guardarSesion(token, usuario, recordar) {
            sessionStorage.removeItem(AUTH_TOKEN_KEY);
            sessionStorage.removeItem(AUTH_USER_KEY);
            localStorage.removeItem(AUTH_TOKEN_KEY);
            localStorage.removeItem(AUTH_USER_KEY);

            if (recordar) {
                localStorage.setItem(AUTH_TOKEN_KEY, token);
                localStorage.setItem(AUTH_USER_KEY, JSON.stringify(usuario || {}));
            } else {
                sessionStorage.setItem(AUTH_TOKEN_KEY, token);
                sessionStorage.setItem(AUTH_USER_KEY, JSON.stringify(usuario || {}));
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (ev)=>{
            ev.preventDefault();
            const errorEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('loginBtn');
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                errorEl.textContent = 'Captura usuario/correo y contraseña.';
                return;
            }

            errorEl.textContent = '';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>';

            try {
                const resp = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username_or_email: username,
                        password,
                    }),
                });

                const data = await resp.json().catch(() => ({}));
                if (!resp.ok) {
                    throw new Error(data?.detail || 'No se pudo iniciar sesión.');
                }

                if (!data?.access_token) {
                    throw new Error('Respuesta inválida del servidor: token no recibido.');
                }

                guardarSesion(data.access_token, data.usuario || {}, remember);
                window.location.href = 'index.html';
            } catch (error) {
                errorEl.textContent = error.message || 'Error al iniciar sesión.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'ENTRAR';
            }
        });

        document.getElementById('openRegisterBtn').addEventListener('click', openRegisterModal);
        
        document.getElementById('register-form').addEventListener('submit', async (ev)=>{
            ev.preventDefault();
            const nombre = document.getElementById('register-name').value.trim();
            const nombreUsuario = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (!nombre || !nombreUsuario || !email || !password || !confirmPassword) {
                mostrarAlerta('Completa todos los campos para registrarte.');
                return;
            }

            try {
                const resp = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre,
                        nombre_usuario: nombreUsuario,
                        email,
                        password,
                        confirm_password: confirmPassword,
                        rol: 'empleado',
                    }),
                });

                const data = await resp.json().catch(() => ({}));
                if (!resp.ok) {
                    throw new Error(data?.detail || 'No se pudo registrar la cuenta.');
                }

                mostrarAlerta(data?.mensaje || 'Cuenta registrada correctamente. Ahora puedes iniciar sesión.');
                closeRegisterModal();
            } catch (error) {
                mostrarAlerta(error.message || 'Error al registrar cuenta.');
            }
        });

        function sendRecovery(){ alert('Se ha enviado un correo (simulado).'); closeModal(); }
    </script>
</body>
</html>
