<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - UCO</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: radial-gradient(circle, #81c5ab, #0f172a); color: white; }
        .login-card { background: rgba(16, 170, 106, 0.582); backdrop-filter: blur(15px); padding: 3rem; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        input { display: block; width: 100%; margin: 15px 0; padding: 12px; background: rgb(255, 255, 255); border: 1px solid #334155; border-radius: 8px; color: rgb(0, 0, 0); box-sizing: border-box; }
        .btn { width: 100%; background: #c4d61c; color: rgb(255, 250, 250); padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Iniciar Sesión</h1>
        <form id="login-form">
            <input type="text" placeholder="Usuario" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem("isAuth", "true");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
